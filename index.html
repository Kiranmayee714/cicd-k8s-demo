<!DOCTYPE html>
<html>
<head>
  <title>CI/CD Pipeline Demo</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      padding: 45px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.12);
      text-align: center;
      max-width: 650px;
    }
    h1 {
      color: #1e3a8a;
      font-size: 36px;
    }
    p {
      color: #475569;
      font-size: 18px;
    }
    .flow {
      margin-top: 25px;
      padding: 15px;
      background: #eef2ff;
      border-radius: 12px;
      color: #3730a3;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>CI/CD Pipeline Successful </h1>
    <p>Application deployed using GitHub, Jenkins, Docker, and Kubernetes by kiran.</p>

  </div>
</body>
</html>
